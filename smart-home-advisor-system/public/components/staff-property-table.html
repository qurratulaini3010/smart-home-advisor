<section class="container py-5">
  <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
    <div>
      <p class="eyebrow">Staff View</p>
      <h1 class="fw-bold text-sage mb-0">Property Market Dataset</h1>
    </div>
    <form class="d-flex flex-wrap gap-2" data-property-filter-form data-property-target="staff">
      <input class="form-control" name="township" placeholder="Township" style="max-width: 180px">
      <input class="form-control" name="area" placeholder="Area" style="max-width: 160px">
      <input class="form-control" name="budget" type="number" min="0" placeholder="Max budget" style="max-width: 160px">
      <button class="btn btn-sage" type="submit">Filter</button>
    </form>
  </div>

  <div class="table-responsive system-card p-0">
    <table class="table align-middle mb-0">
      <thead>
        <tr>
          <th>Township</th>
          <th>Area</th>
          <th>Type</th>
          <th>Median Price</th>
          <th>Yield</th>
          <th>3Yr Growth</th>
          <th>Transactions</th>
          <th>Safety</th>
          <th>Risk</th>
          <th>Distances</th>
        </tr>
      </thead>
      <tbody data-property-staff-table>
        <tr><td colspan="10" class="text-muted p-4">Loading properties...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<script src="assets/js/property-components.js" defer></script>
